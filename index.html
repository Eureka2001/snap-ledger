<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapLedger</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="js/i18n.js"></script>
  </head>
  <body>
    <!-- Lock Screen -->
    <div id="view-lock" class="view">
      <div class="lock-container">
        <button class="btn btn-lang lock-lang-btn" onclick="UI.toggleLanguage()" id="lock-lang-btn">EN</button>
        <img class="app-logo" src="assets/LOGO.png" alt="SnapLedger" />
        <h1 class="app-title">SnapLedger</h1>
        <p class="app-slogan" data-i18n="app.slogan">告别流水，看见变化。</p>
        <div class="app-features">
          <div class="feature-tag" data-i18n="features.snapshot">资产快照 · 非流水账</div>
          <div class="feature-tag" data-i18n="features.local">本地运行 · 零依赖</div>
          <div class="feature-tag" data-i18n="features.privacy">加密存储 · 隐私优先</div>
        </div>
        <div class="lock-action">
          <button class="btn btn-primary btn-block" onclick="UI.showCreateModal()" data-i18n="lockScreen.newLedger">+ 新建账本</button>
        </div>
        <div id="ledger-list" class="ledger-list"></div>
      </div>
    </div>
    <!-- Create Ledger Modal -->
    <div id="create-modal"
         class="modal hidden"
         onclick="UI.closeCreateModal(event)">
      <div class="modal-body">
        <div class="modal-header">
          <h3 data-i18n="createModal.title">新建账本</h3>
          <button class="btn btn-sm" onclick="UI.hideCreateModal()" data-i18n="createModal.close">关闭</button>
        </div>
        <div class="form-modal-content">
          <div class="form-row">
            <div class="form-group">
              <label>
                <span data-i18n="createModal.ledgerName">账本名称</span> <span class="required">*</span>
              </label>
              <input type="text" id="new-ledger-name" data-i18n-placeholder="createModal.ledgerNamePlaceholder" placeholder="例如：我的账本" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>
                <span data-i18n="createModal.password">密码</span> <span class="required">*</span>
              </label>
              <input type="password" id="new-ledger-password" data-i18n-placeholder="createModal.passwordPlaceholder" placeholder="至少4位" />
            </div>
            <div class="form-group">
              <label>
                <span data-i18n="createModal.confirmPassword">确认密码</span> <span class="required">*</span>
              </label>
              <input type="password" id="new-ledger-password-confirm" data-i18n-placeholder="createModal.confirmPasswordPlaceholder" placeholder="再次输入" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="createModal.passwordHint">密码提示</label>
              <input type="text" id="new-ledger-hint" data-i18n-placeholder="createModal.passwordHintPlaceholder" placeholder="防止忘记密码" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn btn-primary" onclick="UI.handleCreateLedger()" data-i18n="createModal.create">创建</button>
            <button class="btn" onclick="UI.hideCreateModal()" data-i18n="createModal.cancel">取消</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Main View -->
    <div id="view-main" class="view hidden">
      <!-- Header -->
      <header class="main-header">
        <div class="main-header-inner">
          <div class="header-left">
            <span class="logo">SnapLedger</span>
            <span class="header-slogan" data-i18n="app.slogan">告别流水，看见变化。</span>
            <span id="current-ledger-name" class="ledger-label"></span>
            <span id="last-export-time" class="export-badge"></span>
          </div>
          <div class="header-right">
            <button class="btn btn-lang" onclick="UI.toggleLanguage()" id="lang-btn">EN</button>
            <button class="btn" onclick="UI.handleRefresh()" data-i18n="header.refresh">刷新</button>
            <button class="btn" onclick="UI.handleImport()" data-i18n="header.import">导入</button>
            <button class="btn" onclick="UI.handleExportCSV()" data-i18n="header.exportCSV">导出 CSV</button>
            <button class="btn" onclick="UI.handleExportJSON()" data-i18n="header.exportJSON">导出 JSON</button>
            <button class="btn btn-danger" onclick="UI.handleLock()" data-i18n="header.lock">锁定</button>
          </div>
        </div>
      </header>
      <!-- Input Form button -->
      <section class="input-section">
        <button class="btn btn-primary"
                id="toggle-form-btn"
                onclick="UI.showForm(null)" data-i18n="main.addSnapshot">+ 新增快照</button>
      </section>
      <!-- Ledger Table -->
      <section class="table-section">
        <div class="table-wrapper">
          <table id="ledger-table">
            <thead>
              <tr>
                <th data-i18n="table.date">日期</th>
                <th data-i18n="table.income">收入</th>
                <th data-i18n="table.cash">现金池</th>
                <th data-i18n="table.investInflow">投资转入</th>
                <th data-i18n="table.investValue">持仓市值</th>
                <th data-i18n="table.receivable">应收账款</th>
                <th data-i18n="table.netAssets">净资产</th>
                <th data-i18n="table.expense">倒推开销</th>
                <th data-i18n="table.actions">操作</th>
              </tr>
            </thead>
            <tbody id="ledger-tbody">
            </tbody>
          </table>
        </div>
      </section>
      <!-- Dashboard Charts -->
      <section class="dashboard">
        <div class="chart-toolbar">
          <span class="chart-title" data-i18n="dashboard.title">数据看板</span>
          <div class="range-selector">
            <button class="range-btn" data-range="3m" onclick="UI.setRange('3m')" data-i18n="dashboard.range3m">3个月</button>
            <button class="range-btn" data-range="6m" onclick="UI.setRange('6m')" data-i18n="dashboard.range6m">6个月</button>
            <button class="range-btn" data-range="1y" onclick="UI.setRange('1y')" data-i18n="dashboard.range1y">1年</button>
            <button class="range-btn active"
                    data-range="all"
                    onclick="UI.setRange('all')" data-i18n="dashboard.rangeAll">全部</button>
          </div>
        </div>
        <div class="charts-grid">
          <div id="chart-asset" class="chart-box"></div>
          <div id="chart-pnl" class="chart-box"></div>
        </div>
        <div class="charts-grid">
          <div id="chart-composition" class="chart-box chart-box-sm"></div>
        </div>
      </section>
    </div>
    <!-- Backup Reminder Modal -->
    <div id="backup-modal" class="modal hidden">
      <div class="modal-body backup-modal-body">
        <div class="modal-header">
          <h3 data-i18n="backupModal.title">数据安全提醒</h3>
          <button class="btn btn-sm" onclick="UI.hideBackupModal()" data-i18n="backupModal.close">关闭</button>
        </div>
        <div class="backup-reminder-content">
          <div class="backup-warning-block">
            <p>
              <strong data-i18n="backupModal.warning1">您的所有数据仅存储在当前浏览器的 IndexedDB 中。</strong>
            </p>
            <p data-i18n="backupModal.warning2">
              如果您清理浏览器数据、更换浏览器或重装系统，且未提前导出备份，数据将<strong>永久丢失且无法恢复</strong>。
            </p>
            <p data-i18n="backupModal.warning3">强烈建议您定期使用"导出 JSON"或"导出 CSV"功能备份数据。</p>
          </div>
          <label class="backup-mute-option">
            <input type="checkbox" id="backup-mute-checkbox" />
            <span data-i18n="backupModal.muteReminder">一个月内不再提醒</span>
          </label>
        </div>
        <div class="form-actions">
          <span style="flex:1"></span>
          <button class="btn btn-primary" onclick="UI.confirmBackupReminder()" data-i18n="backupModal.gotIt">我知道了</button>
        </div>
      </div>
    </div>
    <!-- Detail Modal -->
    <div id="detail-modal"
         class="modal hidden"
         onclick="UI.closeDetailModal(event)">
      <div class="modal-body">
        <div class="modal-header">
          <h3 id="detail-title" data-i18n="detailModal.title">快照详情</h3>
          <button class="btn btn-sm" onclick="UI.hideDetailModal()" data-i18n="detailModal.close">关闭</button>
        </div>
        <div id="detail-content" class="detail-content"></div>
      </div>
    </div>
    <!-- Form Modal -->
    <div id="form-modal"
         class="modal hidden"
         onclick="UI.closeFormModal(event)">
      <div class="modal-body">
        <div class="modal-header">
          <h3 id="form-title" data-i18n="formModal.addTitle">新增快照</h3>
          <button class="btn btn-sm" onclick="UI.hideForm()" data-i18n="formModal.close">关闭</button>
        </div>
        <div class="form-modal-content">
          <div class="form-row">
            <div class="form-group">
              <label>
                <span data-i18n="formModal.date">快照日期</span> <span class="required">*</span>
              </label>
              <input type="date" id="f-date" required />
              <div id="f-date-warning" class="expense-warning hidden"></div>
            </div>
            <div class="form-group">
              <label>
                <span data-i18n="formModal.cash">现金池总额</span> <span class="required">*</span>
              </label>
              <input type="number" id="f-cash" step="1" value="0" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="formModal.income">本期总收入</label>
              <input type="number" id="f-income" step="1" value="0" />
            </div>
            <div class="form-group">
              <label data-i18n="formModal.incomeNote">收入说明</label>
              <input type="text" id="f-income-note" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="formModal.receivable">应收账款</label>
              <input type="number" id="f-receivable" step="1" value="0" />
            </div>
            <div class="form-group">
              <label data-i18n="formModal.receivableNote">应收账款说明</label>
              <input type="text" id="f-receivable-note" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="formModal.investInflow">投资净转入</label>
              <input type="number" id="f-invest-inflow" step="1" value="0" />
            </div>
            <div class="form-group">
              <label data-i18n="formModal.investInflowNote">投资净转入说明</label>
              <input type="text" id="f-invest-inflow-note" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="formModal.investValue">持仓市值</label>
              <input type="number" id="f-invest-value" step="1" value="0" />
            </div>
            <div class="form-group">
              <label data-i18n="formModal.investNote">持仓说明</label>
              <input type="text" id="f-invest-note" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="formModal.expense">倒推实际开销</label>
              <div id="f-expense-preview" class="expense-preview">¥0.00</div>
              <div id="f-expense-warning" class="expense-warning hidden" data-i18n="formModal.expenseWarning">开销为负值，请检查数据是否正确</div>
            </div>
            <div class="form-group">
              <label data-i18n="formModal.expenseNote">开销说明</label>
              <input type="text" id="f-expense-note" />
            </div>
          </div>
          <div class="form-actions">
            <button id="form-delete-btn"
                    class="btn btn-danger"
                    onclick="UI.handleDeleteFromForm()"
                    style="display:none" data-i18n="formModal.delete">删除</button>
            <span style="flex:1"></span>
            <button class="btn btn-primary" onclick="UI.handleSave()" data-i18n="formModal.save">保存</button>
            <button class="btn" onclick="UI.hideForm()" data-i18n="formModal.cancel">取消</button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/schema.js"></script>
    <script src="js/calc.js"></script>
    <script src="js/crypto.js"></script>
    <script src="js/store.js"></script>
    <script src="js/io.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
